<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Arena - Setup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container setup-container">
        <header>
            <h1><i class="fa-solid fa-khanda"></i> LeetCode Arena</h1>
            <p>Configure the battle parameters</p>
        </header>

        <form id="setupForm" class="setup-form glass-card">
            <div class="players-config">

                <!-- Player 1 Config -->
                <div class="player-col p1-col">
                    <div class="col-header">
                        <i class="fa-solid fa-user-ninja"></i> Player 1
                    </div>

                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="p1User" placeholder="e.g. tourist" required>
                    </div>

                    <div class="handicap-box">
                        <div class="h-title">Handicap / Baseline</div>
                        <div class="h-input-row">
                            <label class="lbl-easy">Easy</label>
                            <input type="number" id="p1Easy" value="0" min="0">
                        </div>
                        <div class="h-input-row">
                            <label class="lbl-med">Medium</label>
                            <input type="number" id="p1Med" value="0" min="0">
                        </div>
                        <div class="h-input-row">
                            <label class="lbl-hard">Hard</label>
                            <input type="number" id="p1Hard" value="0" min="0">
                        </div>
                    </div>
                </div>

                <div class="vs-divider-vertical">
                    <span>VS</span>
                </div>

                <!-- Player 2 Config -->
                <div class="player-col p2-col">
                    <div class="col-header">
                        <i class="fa-solid fa-user-astronaut"></i> Player 2
                    </div>

                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="p2User" placeholder="e.g. jayap" required>
                    </div>

                    <div class="handicap-box">
                        <div class="h-title">Handicap / Baseline</div>
                        <div class="h-input-row">
                            <label class="lbl-easy">Easy</label>
                            <input type="number" id="p2Easy" value="0" min="0">
                        </div>
                        <div class="h-input-row">
                            <label class="lbl-med">Medium</label>
                            <input type="number" id="p2Med" value="0" min="0">
                        </div>
                        <div class="h-input-row">
                            <label class="lbl-hard">Hard</label>
                            <input type="number" id="p2Hard" value="0" min="0">
                        </div>
                    </div>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="battle-btn">
                    START BATTLE <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
