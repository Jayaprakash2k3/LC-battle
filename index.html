<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetCode Arena - Setup</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container setup-container">
        <header>
            <h1><i class="fa-solid fa-khanda"></i> LeetCode Arena</h1>
            <p>Configure the battle parameters</p>
        </header>

        <form id="setupForm" class="setup-form glass-card">
            <div id="playersContainer" class="players-config">
                <!-- Dynamically populated via JS -->
            </div>

            <div class="form-actions">
                <button type="submit" class="battle-btn">
                    START BATTLE <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>

</html>
