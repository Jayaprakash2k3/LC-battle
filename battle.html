<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Results - LeetCode Arena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="battle-body">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Loading Screen -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loader-lg"></div>
        <h2>Fetching Battle Data...</h2>
    </div>

    <main class="container battle-container hidden" id="battleContent">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> New Battle</a>

        <!-- Top Section: Final Scores & Winner -->
        <section class="hero-scores glass-card" id="heroScores">
            <!-- Dynamically populated via JS -->
        </section>



        <!-- Middle Section: Category Battle -->
        <section class="category-battle glass-card" id="categoryBattle">
            <h3>Category Breakdown</h3>
            <div id="categoryContent">
                <!-- Dynamically populated via JS -->
            </div>
        </section>

        <!-- Bottom Section: Extra Stats -->
        <section class="extra-stats glass-card">
            <h3>Combat Stats</h3>
            <div class="stats-table-wrapper">
                <div class="stats-table" id="statsTable">
                    <!-- Dynamically populated via JS -->
                </div>
            </div>
        </section>

        <div id="errorOverlay" class="error-overlay hidden">
            <div class="glass-card error-card">
                <i class="fa-solid fa-circle-exclamation"></i>
                <h3 id="errorText">Error loading data</h3>
                <a href="index.html" class="btn-retry">Return to Setup</a>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>

</html>
